name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Node build + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sefi
          POSTGRES_PASSWORD: sefi
          POSTGRES_DB: sefi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sefi"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://sefi:sefi@localhost:5432/sefi
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm build
      - name: Unit tests (with Postgres)
        run: pnpm test

  contracts:
    name: Rust contracts (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Rust
        id: rust
        run: |
          if command -v cargo >/dev/null 2>&1; then echo "have=1" >> "$GITHUB_OUTPUT"; else echo "have=0" >> "$GITHUB_OUTPUT"; fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.rust.outputs.have == '1' || true
      - name: cargo test verifier-registry
        run: |
          if [ -f contracts/verifier-registry/Cargo.toml ]; then
            cargo test --manifest-path contracts/verifier-registry/Cargo.toml || echo "::warning::verifier-registry cargo test failed (soroban-sdk may need wasm target)"
          else
            echo "::notice::no verifier-registry contract; skipped"
          fi

  noir:
    name: Noir circuits (nargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Noir (noirup)
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash || echo "noirup install failed"
          echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
      - name: nargo check (skips if unavailable)
        run: |
          if command -v nargo >/dev/null 2>&1; then
            for d in circuits/*/; do
              [ -f "$d/Nargo.toml" ] && (cd "$d" && nargo check) || true
            done
          else
            echo "::warning::nargo not available; Noir checks skipped with reason"
          fi
