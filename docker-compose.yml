# Sefi Stellar — low-cost single-host stack (spec §17).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sefi
      POSTGRES_PASSWORD: sefi
      POSTGRES_DB: sefi
    ports:
      - "5432:5432"
    volumes:
      - sefi_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sefi"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: api
    environment:
      DATABASE_URL: postgres://sefi:sefi@postgres:5432/sefi
      SEFI_NETWORK: ${SEFI_NETWORK:-testnet}
      SEFI_MOCK: ${SEFI_MOCK:-1}
      SEFI_RPC_URL: ${SEFI_RPC_URL:-}
      SEFI_HORIZON_URL: ${SEFI_HORIZON_URL:-}
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: worker
    environment:
      DATABASE_URL: postgres://sefi:sefi@postgres:5432/sefi
      SEFI_NETWORK: ${SEFI_NETWORK:-testnet}
      SEFI_MOCK: ${SEFI_MOCK:-1}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sefi_pg:
